name: heimdall

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: heimdall
      POSTGRES_PASSWORD: heimdall
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heimdall -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  dataset-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.dataset-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATASET_DB_DSN: postgres://heimdall:heimdall@postgres:5432/heimdall_datasets?sslmode=disable
      DATASET_STORAGE_PATH: /data/datasets
      PORT: "8080"
    volumes:
      - dataset_artifacts:/data/datasets
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  scope-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.scope-service
    depends_on:
      postgres:
        condition: service_healthy
      dataset-service:
        condition: service_healthy
    environment:
      SCOPE_DB_DSN: postgres://heimdall:heimdall@postgres:5432/heimdall_scope_service?sslmode=disable
      DATASET_SERVICE_URL: http://dataset-service:8080
      PORT: "8081"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  routing-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.routing-service
    depends_on:
      postgres:
        condition: service_healthy
      dataset-service:
        condition: service_healthy
    environment:
      ROUTING_DB_DSN: postgres://heimdall:heimdall@postgres:5432/heimdall_routing_service?sslmode=disable
      DATASET_SERVICE_URL: http://dataset-service:8080
      PORT: "8082"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  target-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.target-service
    depends_on:
      postgres:
        condition: service_healthy
      scope-service:
        condition: service_healthy
      routing-service:
        condition: service_healthy
    environment:
      TARGET_DB_DSN: postgres://heimdall:heimdall@postgres:5432/heimdall_target_service?sslmode=disable
      SCOPE_SERVICE_URL: http://scope-service:8081
      ROUTING_SERVICE_URL: http://routing-service:8082
      PORT: "8083"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8083/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  campaign-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.campaign-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      target-service:
        condition: service_healthy
    environment:
      CAMPAIGN_DB_DSN: postgres://heimdall:heimdall@postgres:5432/heimdall_campaign_service?sslmode=disable
      REDIS_ADDR: redis:6379
      TARGET_SERVICE_URL: http://target-service:8083
      PORT: "8084"
      CAMPAIGN_SCHEDULER_ENABLED: "true"
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8084/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  execution-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.execution-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      target-service:
        condition: service_healthy
    environment:
      EXECUTION_DB_DSN: postgres://heimdall:heimdall@postgres:5432/heimdall_execution_service?sslmode=disable
      REDIS_ADDR: redis:6379
      TARGET_SERVICE_URL: http://target-service:8083
      PORT: "8085"
      INGEST_ENABLED: "true"
      INVENTORY_SERVICE_URL: http://inventory-service:8086
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8085/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  inventory-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.inventory-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INVENTORY_DB_DSN: postgres://heimdall:heimdall@postgres:5432/heimdall_inventory_service?sslmode=disable
      PORT: "8086"
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8086/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  scan-worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.scan-worker
    cap_add:
      - NET_RAW   # required for masscan/zmap raw SYN packets
    depends_on:
      execution-service:
        condition: service_healthy
    environment:
      EXECUTION_SERVICE_URL: http://execution-service:8085
      # default is masscan; set SCAN_ENGINE=zmap to use zmap
      WORKER_NAME: docker-scan-worker-1
      WORKER_REGION: docker
      WORKER_VERSION: "0.1.0"
      WORKER_CAPABILITIES: discovery-basic,portscan-basic,portscan-full,portscan-medium,discovery-plus-ports
      WORKER_MAX_CONCURRENCY: "5"   # jobs in parallel per worker (increase to 10 if host has capacity)
      HEARTBEAT_INTERVAL: 25s
      CLAIM_INTERVAL: 5s
    restart: unless-stopped

  # CLI: no Go required on host. Use: docker compose run heimdallctl install | status | execution list | ...
  # To build/rebuild after code changes: docker compose --profile cli build heimdallctl
  heimdallctl:
    profiles:
      - cli
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.heimdallctl
    environment:
      HEIMDALL_DATASET_URL: http://dataset-service:8080
      HEIMDALL_SCOPE_URL: http://scope-service:8081
      HEIMDALL_ROUTING_URL: http://routing-service:8082
      HEIMDALL_TARGET_URL: http://target-service:8083
      HEIMDALL_CAMPAIGN_URL: http://campaign-service:8084
      HEIMDALL_EXECUTION_URL: http://execution-service:8085
    # Optional: mount config (e.g. ~/.config/heimdall/config.yaml) if you need custom URLs when running from host
    # volumes:
    #   - ./config.yaml:/app/.config/heimdall/config.yaml:ro

volumes:
  postgres_data:
  dataset_artifacts:
